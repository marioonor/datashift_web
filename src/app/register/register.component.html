<div class="container">
  <div class="register-form">
    <h1>DataShift</h1><br><br>
    <h2>Register</h2>
    <form class="frm" [formGroup]="register" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="txtlabel" for="userId">User Name:</label>
        <input class="txtlabel" type="text" id="username" formControlName="username" required />
      </div><br>
      <div class="form-group">
        <label class="txtlabel" for="userId">User ID:</label>
        <input class="txtlabel" type="text" id="email" formControlName="email" required />
      </div><br>
      <div class="form-group">
        <label class="txtlabel" for="password">Password:</label>
        <input class="txtlabel" type="password" id="password" formControlName="password" required />
      </div><br><br>
      <button class="btn" type="submit" class="btn">Register</button><br>
      <a (click)="onLogin()"><< Back</a>
    </form>
  </div>
</div>
